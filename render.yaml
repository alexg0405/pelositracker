# Render blueprint. The Docker image builds the Rust engine and runs uvicorn.
# Sleeping instances pause live feeds. For durable data, set DATABASE_URL to a
# PostgreSQL DSN or attach a disk and uncomment the SQLite paths below.
services:
  - type: web
    name: live-edge-monitor
    runtime: docker
    plan: free
    healthCheckPath: /api/ready
    autoDeploy: true
    envVars:
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: THE_ODDS_API_KEY   # optional; public Polymarket feeds need no key
        sync: false
      - key: ODDS_POLL_SECONDS
        value: "45"
      - key: APP_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: "1"
      - key: MAX_DATA_AGE_SECONDS
        value: "120"
      # Keep global floors neutral so custom bots apply their own thresholds.
      - key: SIGNAL_CONFIDENCE_THRESHOLD
        value: "0"
      - key: SIGNAL_EDGE_THRESHOLD
        value: "0"
      - key: ODDS_PLAYER_MARKETS  # e.g. player_points,player_rebounds (per sport)
        sync: false
      - key: DATABASE_URL       # optional PostgreSQL; takes priority over SQLite
        sync: false
      # - key: LEDGER_DB
      #   value: /var/data/ledger.db
      # - key: HISTORY_DB
      #   value: /var/data/history.db
      # - key: STATE_DB          # optional; otherwise monitor state uses LEDGER_DB
      #   value: /var/data/state.db
    # disk:                       # requires a paid plan
    #   name: ledger
    #   mountPath: /var/data
    #   sizeGB: 1
